<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원 로그인 - 에브라임 시드</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, oklch(15% 0.05 250) 0%, oklch(25% 0.15 250) 100%);
        }
        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 1rem;
        }
        .login-card {
            background: white;
            border-radius: 24px;
            padding: 3rem 2.5rem;
            box-shadow: 0 30px 60px oklch(0% 0 0 / 0.3);
        }
        .login-logo {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .login-logo a {
            font-size: 1.8rem;
            font-weight: 800;
            color: oklch(45% 0.25 250);
            text-decoration: none;
            letter-spacing: -0.03em;
        }
        .login-logo a span { color: oklch(60% 0.2 250); }
        .login-logo p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }
        h1 {
            font-size: 1.5rem;
            color: var(--text-main);
            margin-bottom: 0.5rem;
            text-align: center;
        }
        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }
        input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid oklch(90% 0.02 250);
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            color: var(--text-main);
            background: oklch(98% 0.01 250);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            outline: none;
        }
        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px oklch(60% 0.2 250 / 0.15);
        }
        .btn-login {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }
        .btn-login:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 8px 20px oklch(60% 0.2 250 / 0.35);
        }
        .btn-login:active { transform: translateY(0); }
        .error-msg {
            display: none;
            background: oklch(95% 0.05 15);
            color: oklch(40% 0.15 15);
            border: 1px solid oklch(85% 0.08 15);
            padding: 0.75rem 1rem;
            border-radius: 10px;
            font-size: 0.875rem;
            margin-bottom: 1rem;
            text-align: center;
        }
        .error-msg.show { display: block; }
        .back-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: var(--text-muted);
        }
        .back-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        .back-link a:hover { text-decoration: underline; }
    </style>
</head>
<body class="noise-bg">
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-logo">
                <a href="index.html">EPH<span>SEED</span></a>
                <p>지능형 무인 매장 관제 서비스</p>
            </div>

            <h1>회원 로그인</h1>
            <p class="subtitle">서비스 이용 정보로 로그인하세요</p>

            <div class="error-msg" id="errorMsg">아이디 또는 비밀번호가 올바르지 않습니다.</div>

            <form id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label for="loginId">아이디</label>
                    <input type="text" id="loginId" name="loginId" placeholder="가입자 아이디 입력" required>
                </div>
                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="password" placeholder="비밀번호 입력" required>
                </div>
                <button type="submit" class="btn-login" id="submitBtn">로그인</button>
            </form>

            <div class="back-link">
                <a href="index.html">← 메인 페이지로 돌아가기</a>
            </div>
        </div>
    </div>

    <script>
        const SALT = 'ephseed_secure_2026';

        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password + SALT);
            const hash = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // 기본 가입자 계정 (관리자 페이지에서 추가한 계정과 병합)
        const DEFAULT_SUBSCRIBERS = [
            { userId: 'EP-374', loginId: 'mango7',   displayName: '회원1', passwordHash: '1a4e7db2ff7842c5eb00576f961dc47aafa21e5e0f3b120f855b92d0985c6f81', storeName: '1호점', storeType: '스터디카페', plan: 'standard', createdAt: '2026-06-30T00:00:00.000Z', active: true },
            { userId: 'EP-851', loginId: 'skyblue3', displayName: '회원2', passwordHash: '9d39db0466a2091f88c5f0ad9cd3d8341bdebd808c8ccbe0342889038fc8b241', storeName: '2호점', storeType: '스터디카페', plan: 'standard', createdAt: '2026-06-30T00:00:00.000Z', active: true },
            { userId: 'EP-629', loginId: 'nova52',   displayName: '회원3', passwordHash: 'bd452368394d1d9f3e58fbcd1526624ac58cd42ca191ba7427ca1c97ec119504', storeName: '3호점', storeType: '스터디카페', plan: 'standard', createdAt: '2026-06-30T00:00:00.000Z', active: true },
            { userId: 'EP-213', loginId: 'tide91',   displayName: '회원4', passwordHash: 'ced71c79e536862963c9d02e2b6797b9f23a0993c8bb4be6f1a50f8dd4d75c47', storeName: '4호점', storeType: '스터디카페', plan: 'standard', createdAt: '2026-06-30T00:00:00.000Z', active: true },
        ];

        function getSubscribers() {
            const stored = JSON.parse(localStorage.getItem('ephseed_subscribers') || '[]');
            // 기본 계정 중 아직 없는 것만 병합
            const storedIds = new Set(stored.map(s => s.userId));
            const merged = [...stored];
            DEFAULT_SUBSCRIBERS.forEach(d => { if (!storedIds.has(d.userId)) merged.push(d); });
            return merged;
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const loginId = document.getElementById('loginId').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const submitBtn = document.getElementById('submitBtn');

            errorMsg.classList.remove('show');
            submitBtn.textContent = '확인 중...';
            submitBtn.disabled = true;

            const passwordHash = await hashPassword(password);
            const subscribers = getSubscribers();
            const subscriber = subscribers.find(s => s.loginId === loginId && s.passwordHash === passwordHash);

            if (subscriber) {
                if (!subscriber.active) {
                    errorMsg.textContent = '비활성화된 계정입니다. 관리자에게 문의해주세요.';
                    errorMsg.classList.add('show');
                } else {
                    sessionStorage.setItem('ephseed_member_session', JSON.stringify({
                        userId: subscriber.userId,
                        loginId: subscriber.loginId,
                        displayName: subscriber.displayName,
                        storeName: subscriber.storeName,
                        storeType: subscriber.storeType,
                        plan: subscriber.plan
                    }));
                    window.location.href = 'member.html';
                }
            } else {
                errorMsg.textContent = '아이디 또는 비밀번호가 올바르지 않습니다.';
                errorMsg.classList.add('show');
            }

            submitBtn.textContent = '로그인';
            submitBtn.disabled = false;
        });

        // Redirect if already logged in
        if (sessionStorage.getItem('ephseed_member_session')) {
            window.location.href = 'member.html';
        }
    </script>
</body>
</html>
